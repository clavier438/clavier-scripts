<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font: 12px -apple-system, sans-serif; margin: 0; padding: 16px; color: #333; }
  h3 { margin: 0 0 4px; font-size: 14px; }
  .sub { color: #888; margin: 0 0 14px; }
  label { display: block; margin: 12px 0 4px; font-weight: 600; }
  input[type=file] { width: 100%; }
  input[type=number] { width: 70px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 4px; }
  .row { display: flex; gap: 14px; }
  button { margin-top: 18px; width: 100%; padding: 11px; background: #18a0fb; color: #fff;
           border: none; border-radius: 6px; font-weight: 700; font-size: 13px; cursor: pointer; }
  button:disabled { background: #cfd8df; cursor: default; }
  #status { margin-top: 12px; color: #666; min-height: 16px; }
</style>
</head>
<body>
  <h3>PDF Grid 배치</h3>
  <p class="sub">PDF를 분해한 PNG들을 선택하면 그리드로 펼쳐 배치합니다.</p>

  <label>PNG/JPG 파일 선택 (여러 장)</label>
  <input type="file" id="files" accept="image/png,image/jpeg" multiple>

  <div class="row">
    <div><label>열 수</label><input type="number" id="cols" value="5" min="1"></div>
    <div><label>간격(px)</label><input type="number" id="gap" value="40" min="0"></div>
    <div><label>최대폭(px)</label><input type="number" id="maxw" value="800" min="0"></div>
  </div>

  <button id="go" disabled>그리드 배치</button>
  <div id="status">파일을 선택하세요</div>

  <script>
    var filesEl = document.getElementById('files');
    var goEl = document.getElementById('go');
    var statusEl = document.getElementById('status');
    var selected = [];

    filesEl.onchange = function () {
      selected = Array.prototype.slice.call(filesEl.files).sort(function (a, b) {
        return a.name.localeCompare(b.name, undefined, { numeric: true });
      });
      goEl.disabled = selected.length === 0;
      statusEl.textContent = selected.length + '장 선택됨' + (selected.length ? ' (' + selected[0].name + ' …)' : '');
    };

    goEl.onclick = async function () {
      goEl.disabled = true;
      statusEl.textContent = '읽는 중…';
      var images = [];
      for (var i = 0; i < selected.length; i++) {
        var buf = await selected[i].arrayBuffer();
        images.push({ name: selected[i].name, bytes: new Uint8Array(buf) });
      }
      var cols = parseInt(document.getElementById('cols').value, 10) || 5;
      var gap = parseInt(document.getElementById('gap').value, 10);
      if (isNaN(gap)) gap = 40;
      var maxWidth = parseInt(document.getElementById('maxw').value, 10) || 0;
      // 그룹 이름: 첫 파일명에서 페이지 접미사 제거
      var groupName = (selected[0] ? selected[0].name.replace(/[-_]?\d+\.\w+$/, '') : 'PDF Grid') || 'PDF Grid';
      statusEl.textContent = '배치 중…';
      parent.postMessage({ pluginMessage: {
        type: 'place-grid', images: images, cols: cols, gap: gap, maxWidth: maxWidth, groupName: groupName
      } }, '*');
    };
  </script>
</body>
</html>
