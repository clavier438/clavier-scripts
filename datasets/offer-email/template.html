<!--
  오퍼 이메일 마스터 템플릿 — 600px table 레이아웃 (이메일 클라이언트 호환).
  {{slot}} 들을 offer.mjs 가 Airtable 레코드 값으로 치환한다.
  이 파일을 고치면 모든 오퍼의 디자인이 바뀐다 (마스터 1개, 콘텐츠만 스왑).
  슬롯을 추가/삭제하려면 여기와 slot-map.json 만 맞추면 됨.
-->
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
</head>
<body style="margin:0; padding:0; background:#f4f4f4;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;">
    <tr>
      <td align="center" style="padding:24px 12px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0"
               style="width:600px; max-width:600px; background:#ffffff;">

          <!-- HERO -->
          <tr>
            <td style="padding:0;">
              <img src="{{hero_image}}" width="600" alt="{{title}}"
                   style="display:block; width:100%; max-width:600px; height:auto; border:0;">
            </td>
          </tr>

          <!-- TITLE -->
          <tr>
            <td style="padding:32px 40px 8px 40px; font-family:'Apple SD Gothic Neo',sans-serif;
                       font-size:24px; line-height:1.35; font-weight:700; color:#1a1a1a;">
              {{title}}
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="padding:8px 40px 24px 40px; font-family:'Apple SD Gothic Neo',sans-serif;
                       font-size:15px; line-height:1.7; color:#444444;">
              {{body_html}}
            </td>
          </tr>

          <!-- CTA -->
          <tr>
            <td align="center" style="padding:8px 40px 40px 40px;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="background:#1a1a1a; border-radius:4px;">
                    <a href="{{cta_url}}" target="_blank"
                       style="display:inline-block; padding:14px 32px; font-family:'Apple SD Gothic Neo',sans-serif;
                              font-size:15px; font-weight:600; color:#ffffff; text-decoration:none;">
                      {{cta_text}}
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="padding:24px 40px; border-top:1px solid #eeeeee;
                       font-family:'Apple SD Gothic Neo',sans-serif; font-size:12px; line-height:1.6; color:#999999;">
              {{footer_html}}
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
